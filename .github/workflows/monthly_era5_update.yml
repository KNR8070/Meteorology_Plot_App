name: Monthly ERA5 Data Update

on:
  schedule:
    # Run at 06:00 UTC on the 5th of every month
    - cron: '0 6 5 * *'
  workflow_dispatch:  # allow manual trigger from the Actions tab

jobs:
  update-era5:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit and push data files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade "cdsapi>=0.7.0" xarray netCDF4 numpy

      - name: Configure CDS API credentials
        env:
          CDSAPI_KEY: ${{ secrets.CDSAPI_KEY }}
        run: |
          # New CDS API (post-2024): url = https://cds.climate.copernicus.eu/api
          # key = just the API token, no "UID:" prefix
          cat > ~/.cdsapirc <<'RCEOF'
          url: https://cds.climate.copernicus.eu/api
          key: ${CDSAPI_KEY}
          RCEOF
          # Expand the env var (heredoc above kept it literal)
          sed -i "s|\${CDSAPI_KEY}|${CDSAPI_KEY}|g" ~/.cdsapirc

      - name: Fetch latest ERA5 data
        run: python scripts/fetch_era5.py

      - name: Commit updated ERA5 data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/era5_*.nc
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: update ERA5 data $(date +'%Y-%m')"

      - name: Push changes
        run: |
          git config http.postBuffer 524288000
          git config http.lowSpeedLimit 0
          git config http.lowSpeedTime 0
          git push origin main
